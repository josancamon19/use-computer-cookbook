# End-to-end smoke test: spins up 100 concurrent sandboxes, takes one screenshot
# each, and verifies the full pipeline (VM creation, Lume, sandbox API, teardown).
# Pair with the smoke-test block in agents/anthropic_cua.py (early return after screenshot).
jobs_dir: jobs
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 100
environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "https://api.dev.use.computer"
    delete: true
agents:
    - import_path: "runner.agents.anthropic_cua:AnthropicCUAAgent"
      model_name: "anthropic/claude-sonnet-4-6"
      kwargs:
          max_steps: 1
datasets:
