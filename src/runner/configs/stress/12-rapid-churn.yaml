# 12. Rapid churn — 15 tasks with only 2 steps each, concurrency 15.
# Creates and destroys sandboxes as fast as possible.
# Tests warm pool replenishment speed under rapid cycling.
jobs_dir: jobs/stress
n_attempts: 3
orchestrator:
    type: local
    n_concurrent_trials: 15
environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "http://10.10.10.2:8080"
    delete: true
agents:
    - import_path: "runner.agents.anthropic_cua:AnthropicCUAAgent"
      model_name: "anthropic/claude-sonnet-4-6"
      kwargs:
          max_steps: 2
datasets:
    - path: datasets/macosworld_ready
      task_names:
          - "sys_apps__12fea1c8*"
          - "sys_apps__1dac89be*"
          - "sys_apps__1f7c22a8*"
          - "sys_apps__2c42adaf*"
          - "sys_apps__3a61c43c*"
          - "sys_apps__43cacdbb*"
          - "sys_apps__4f7568c7*"
          - "sys_apps__5a6b33d6*"
          - "sys_apps__6e91ea49*"
          - "sys_apps__7df26ea3*"
          - "file_management__0156a050*"
          - "file_management__09b8c538*"
          - "file_management__1020ae86*"
          - "file_management__119efc21*"
          - "file_management__14b2bf12*"
