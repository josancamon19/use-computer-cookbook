# 10. Full fleet stress — 20 concurrent across all categories.
# Eats 20 of 54 warm slots. Tests heartbeat stability, warm pool replenishment,
# session management, and lume under sustained load across the fleet.
jobs_dir: jobs/stress
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 20
environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "http://10.10.10.2:8080"
    delete: true
agents:
    - import_path: "runner.agents.anthropic_cua:AnthropicCUAAgent"
      model_name: "anthropic/claude-sonnet-4-6"
      kwargs:
          max_steps: 5
datasets:
    - path: datasets/macosworld_ready
      task_names:
          - "sys_apps__12fea1c8*"
