# 11. Chaos — 30 concurrent, mixed agents, mixed tasks, all at once.
# Eats 30 warm slots. Tests everything simultaneously:
# - Warm pool drain + replenishment under heavy load
# - Multiple agent types competing for sandboxes
# - Concurrent screenshot/click/type across many VMs
# - Destroy storm as short tasks finish while long ones run
# - Gateway routing under sustained parallel requests
jobs_dir: jobs/stress
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 30
environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "http://10.10.10.2:8080"
    delete: true
agents:
    # CUA agents — different models hit different code paths
    - import_path: "runner.agents.anthropic_cua:AnthropicCUAAgent"
      model_name: "anthropic/claude-sonnet-4-6"
      kwargs:
          max_steps: 10
    - import_path: "runner.agents.openai_cua:OpenAICUAAgent"
      model_name: "openai/computer-use-preview"
      kwargs:
          max_steps: 10
    - import_path: "runner.agents.generic_cua:GenericCUAAgent"
      model_name: "openai/gpt-4o"
      kwargs:
          max_steps: 10
    # CLI agents — SSH path instead of HTTP
    - name: "claude-code"
      model_name: "anthropic/claude-sonnet-4-6"
      kwargs:
          max_turns: 10
datasets:
    - path: datasets/macosworld_ready
      task_names:
          # Mix of categories to hit different pre_commands and grading paths
          - "sys_apps__12fea1c8*"
          - "sys_apps__1dac89be*"
          - "sys_apps__1f7c22a8*"
          - "sys_apps__2c42adaf*"
          - "sys_apps__3a61c43c*"
          - "sys_apps__43cacdbb*"
          - "sys_apps__4f7568c7*"
          - "sys_apps__5a6b33d6*"
          - "file_management__0156a050*"
          - "file_management__09b8c538*"
          - "file_management__1020ae86*"
          - "file_management__119efc21*"
          - "file_management__14b2bf12*"
          - "file_management__24903bd5*"
          - "file_management__35098129*"
          - "productivity__000d01d7*"
          - "productivity__08d3cedf*"
          - "productivity__13e2c34e*"
          - "sys_and_interface__1dac89be*"
          - "sys_and_interface__2bbbc32a*"
          - "sys_and_interface__5a6b33d6*"
