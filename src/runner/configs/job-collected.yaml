# Harbor job config for tasks exported via collected/export.py.
# Today: iOS only. Pick the active agent by uncommenting exactly one block.
#
#   cd runner
#   uv run harbor run \
#     -c src/runner/configs/job-collected.yaml \
#     -p datasets/collected/ios/<task-name>

jobs_dir: ./jobs
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 2
environment:
    import_path: runner.environments.mmini:MminiEnvironment
    kwargs:
        gateway_url: http://10.10.10.2:8081
        platform: macos
    delete: true

agents:
    # Replay collected actions — no LLM, walks <task>/actions.json
    - import_path: runner.agents.debug_cua:DebugCUAAgent
      model_name: debug
      kwargs:
          replay: true
          max_steps: 30

    # ------------------------------------------------------------------
    # Other agents — uncomment one at a time:
