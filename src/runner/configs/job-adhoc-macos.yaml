# Harbor job config for macOS adhoc tasks (datasets/adhoc/macos/).
# Adhoc tasks have no recorded actions and (usually) no verifier — the run
# is for visual / VNC inspection. Sonnet 4.6 is the default agent.
#
#   cd runner
#   uv run harbor run \
#     -c src/runner/configs/job-adhoc-macos.yaml \
#     -p datasets/adhoc/macos

jobs_dir: ./jobs
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 3
environment:
    import_path: runner.environments.mmini:MminiEnvironment
    kwargs:
        gateway_url: http://10.10.10.2:8081
        platform: macos
    delete: true

agents:
    - import_path: runner.agents.anthropic_cua:AnthropicCUAAgent
      model_name: anthropic/claude-sonnet-4-6
      kwargs:
          max_steps: 50
