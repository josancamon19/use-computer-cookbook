jobs_dir: ./jobs
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 70
environment:
    import_path: runner.environments.use_computer:UseComputerEnvironment
    kwargs:
        gateway_url: https://api.use.computer
        platform: ios
    delete: true

agents:
