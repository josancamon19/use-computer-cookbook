jobs_dir: jobs
n_attempts: 1

orchestrator:
    type: local
    n_concurrent_trials: 1

environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "http://localhost:8080"

agents:
    - name: "claude-code"
      model_name: "anthropic/claude-sonnet-4-6"
      kwargs:
          max_turns: 20

    - name: "codex"
      model_name: "openai/o3"
      kwargs:
          max_turns: 20

datasets:
    - path: datasets/macosworld_ready
