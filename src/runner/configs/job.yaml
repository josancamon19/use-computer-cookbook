jobs_dir: jobs
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 70
environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "http://10.10.10.2:8080"
    delete: true
agents:
    # - import_path: "runner.agents.anthropic_cua:AnthropicCUAAgent"
    #   model_name: "anthropic/claude-sonnet-4-6"
    #   kwargs:
    #       max_steps: 20
    - import_path: "runner.agents.debug_cua:DebugCUAAgent"
      model_name: "debug"
      override_timeout_sec: 2400   # 40 min — gives the 30-min-target trial headroom over harbor's 30-min default
      kwargs:
          max_steps: 120        # 120 × ~15s/step ≈ 30 min trial
          realistic: true

