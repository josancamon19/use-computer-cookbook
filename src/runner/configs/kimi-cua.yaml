# Kimi K2.5 CUA via Tinker + generic pyautogui agent
#
# Usage:
#   cd runner
#   TINKER_API_KEY=... MMINI_API_KEY=sk-dev-... uv run harbor run \
#     -c src/runner/configs/kimi-cua.yaml \
#     --path datasets/macosworld_ready \
#     -t "sys_apps__12fea1c8*"
#
# Required env vars:
#   TINKER_API_KEY  — Thinking Machines Tinker API
#   MMINI_API_KEY   — mmini gateway (dev)
#
jobs_dir: jobs
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 10
environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "http://10.10.10.2:8081"
    delete: true
agents:
    - import_path: "runner.agents.generic_cua:GenericCUAAgent"
      model_name: "moonshotai/Kimi-K2.5"
      kwargs:
          llm_backend: tinker
          max_steps: 20
          max_tokens: 4096
datasets:
    - path: datasets/macosworld_ready
      task_names:
          - "sys_apps__96786064-5d99-e102*"
          - "sys_apps__152a753b-7258-6630*"
          - "sys_and_interface__94cab5ba-eb70*"
          - "sys_and_interface__694e8aa5-9106*"
          - "productivity__7cf47313-5280-71d5*"
          - "productivity__0bc05a1d-1e5a-c967*"
          - "safety__72158f95-631f-8af0-20f3*"
          - "safety__3ef3a054-c2cc-be98-dc08*"
          - "file_management__f576f917-0978*"
          - "file_management__9fe98f0a-0450*"