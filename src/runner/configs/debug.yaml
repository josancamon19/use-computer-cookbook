datasets:
    - path: datasets/macosworld_ready
      # 95 tasks that should be functional after the 2026-04-09 infra fixes:
      #   - fakeredis<2.35 pin + on_startup.sh patch (cua-server starts cleanly)
      #   - user TCC Privacy grants (Calendar/Reminders/Contacts/Photos/Media/...
      #     no longer hang waiting on a dialog the headless SSH can never see)
      #   - fd-leak fixes in warm pool (DHCP cleanup, health check loops)
      # Classification method (see scripts/dev/classify-macosworld.py if added):
      #   tasks whose pre_command.sh / test.sh contain NO osascript at all, OR
      #   whose osascript calls only use AppleEvents (tell application "Foo")
      #   without touching the Accessibility API (attribute "AX...", tell process,
      #   keystroke, key code, click menu/button) — since we cannot pre-grant
      #   kTCCServiceAccessibility from the bake recipe on a sealed system volume.
      # The remaining 24 blocked tasks (mostly sys_apps + a few file_management
      # that inspect AXChildren of the frontmost process) are tracked in
