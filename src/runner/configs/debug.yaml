jobs_dir: jobs
n_attempts: 4
orchestrator:
    type: local
    n_concurrent_trials: 72
environment:
    import_path: "runner.environments.mmini:MminiEnvironment"
    kwargs:
        gateway_url: "http://10.10.10.2:8081"
    delete: true
agents:
    # - import_path: "runner.agents.anthropic_cua:AnthropicCUAAgent"
    #   model_name: "anthropic/claude-sonnet-4-6"
    #   kwargs:
    #       max_steps: 20
    # - import_path: "runner.agents.debug_cua:DebugCUAAgent"
    #   model_name: "debug"
    #   kwargs:
    #       max_steps: 1
    - import_path: "runner.agents.generic_cua:GenericCUAAgent"
      model_name: "openai/accounts/fireworks/routers/kimi-k2p5-turbo"
      kwargs:
          max_steps: 20
          max_tokens: 4096
          api_base: "https://api.fireworks.ai/inference/v1"
          # api_key picked up from FIREWORKS_API_KEY env var by litellm
          # anthropic is too slow, rate limits and expensive to test infra fast enough.
