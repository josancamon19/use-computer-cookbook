# Curated subset of 13 macosworld tasks kept after pruning the
# 2026-05-01__17-06-07 run (full backup at jobs/2026-05-01__17-06-07__before-prune).
jobs_dir: jobs
n_attempts: 1
orchestrator:
    type: local
    n_concurrent_trials: 16
environment:
    import_path: "runner.environments.use_computer:UseComputerEnvironment"
    kwargs:
        gateway_url: "https://api.use.computer"
    delete: true
agents:
    - import_path: "runner.agents.debug:DebugCUAAgent"
      model_name: "debug"
      kwargs:
          max_steps: 1
          realistic: true

    - import_path: "runner.agents.macos.anthropic:AnthropicCUAAgent"
      model_name: "anthropic/claude-sonnet-4-6"
      kwargs:
          max_steps: 50

    # - import_path: "runner.agents.macos.generic:GenericCUAAgent"
