    #       api_base: "https://api.fireworks.ai/inference/v1"

    # - import_path: "runner.agents.macos.generic:GenericCUAAgent"
    #   model_name: "openai/accounts/fireworks/models/qwen3p6-plus"
    #   kwargs:
    #       max_steps: 20
